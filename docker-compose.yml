# Orchestration complète : Postgres (2 bases), Zookeeper, Kafka, les 2 microservices.
# Réseau nommé : les compose par service peuvent s’y rattacher (external: true).
#
# Variables : copier `.env.example` vers `.env` à la racine, ou utiliser les valeurs par défaut.

name: yowyob-pay

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - yowyob_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - yowyob-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - yowyob-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_HOST_PORT:-9092},PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 15s
      retries: 18
      start_period: 40s
    networks:
      - yowyob-net

  payment-service:
    build:
      context: ./payment-service-main
      dockerfile: Dockerfile
    image: yowyob/payment-service:local
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: payment_db
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_LIQUIBASE_USERNAME: postgres
      DB_LIQUIBASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_HOST: kafka
      KAFKA_PORT: "29092"
      JWT_SECRET: "${JWT_SECRET:-B7lNty52nURS1lCg6KjEvPh6e71c/ndOh1H4mCMRMgo=}"
      PAYMENT_SERVER_URL: http://localhost:8090
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yowyob-net

  user-payment-service:
    build:
      context: ./user-payment-service-main
      dockerfile: Dockerfile
    image: yowyob/user-payment-service:local
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: payment
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_LIQUIBASE_USERNAME: postgres
      DB_LIQUIBASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_HOST: kafka
      KAFKA_PORT: "29092"
      JWT_SECRET: "${JWT_SECRET:-B7lNty52nURS1lCg6KjEvPh6e71c/ndOh1H4mCMRMgo=}"
    ports:
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yowyob-net

volumes:
  yowyob_postgres_data:

networks:
  yowyob-net:
    name: yowyob-net
    driver: bridge
