# Profil « docker » : Postgres local, Kafka PLAINTEXT (sans SASL).
# Swagger UI : chemins relatifs à la racine (sans préfixe gateway).

server:
  port: 8090

app:
  swagger:
    server-url: ${PAYMENT_SERVER_URL:http://localhost:8090}

springdoc:
  api-docs:
    enabled: ${EXPOSE_OPENAPI:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${EXPOSE_OPENAPI:true}
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs

spring:
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:payment_db}
    user: ${DB_LIQUIBASE_USERNAME}
    password: ${DB_LIQUIBASE_PASSWORD}
    enabled: true
    default-schema: ${DB_SCHEMA:public}
    liquibase-schema: ${DB_SCHEMA:public}

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:payment_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    pool:
      enabled: true
      initial-size: ${R2DBC_POOL_INITIAL_SIZE:1}
      max-size: ${R2DBC_POOL_MAX_SIZE:5}
      max-idle-time: ${R2DBC_POOL_MAX_IDLE_TIME:30m}
      max-life-time: ${R2DBC_POOL_MAX_LIFE_TIME:10m}
      acquire-retry: ${R2DBC_POOL_ACQUIRE_RETRY:3}
      max-acquire-time: ${R2DBC_POOL_MAX_ACQUIRE_TIME:30s}
      validation-query: ${R2DBC_POOL_VALIDATION_QUERY:SELECT 1}
  sql:
    init:
      mode: never

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_HOST}:${KAFKA_PORT:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

application:
  external:
    stock-service-url: http://${EXTERNAL_HOST:host.docker.internal}:8081
  security:
    internal-api-key: ${PAYMENT_INTERNAL_API_KEY}
    expose-openapi: ${EXPOSE_OPENAPI:true}
    cors-allowed-origins-csv: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3999}
    jwt:
      secret: ${JWT_SECRET}
  kafka:
    topics:
      wallet-create: wallet-create-topic
      payment-commission: transaction-commission-topic
  payment:
    commission-rate: ${COMMISSION_RATE:0.1}
  cache:
    redis:
      enabled: ${CACHE_REDIS_ENABLED:true}
    wallet-balance-ttl: ${CACHE_WALLET_BALANCE_TTL:PT30S}
  business:
    max-transaction-amount: ${MAX_TRANSACTION_AMOUNT:1000000}
