server:
  port: 8090
  forward-headers-strategy: framework

app:
  swagger:
    server-url: ${PAYMENT_SERVER_URL:http://localhost:8090}

springdoc:
  api-docs:
    enabled: ${EXPOSE_OPENAPI:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${EXPOSE_OPENAPI:true}
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs

spring:
  application:
    name: payment-service
  docker:
    compose:
      enabled: false
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    pool:
      enabled: true
      initial-size: ${R2DBC_POOL_INITIAL_SIZE:1}
      max-size: ${R2DBC_POOL_MAX_SIZE:5}
      max-idle-time: ${R2DBC_POOL_MAX_IDLE_TIME:30m}
      max-life-time: ${R2DBC_POOL_MAX_LIFE_TIME:10m}
      acquire-retry: ${R2DBC_POOL_ACQUIRE_RETRY:3}
      max-acquire-time: ${R2DBC_POOL_MAX_ACQUIRE_TIME:30s}
      validation-query: ${R2DBC_POOL_VALIDATION_QUERY:SELECT 1}
  sql:
    init:
      mode: never
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

application:
  external:
    stock-service-url: http://${EXTERNAL_HOST:localhost}:8081
  security:
    internal-api-key: ${PAYMENT_INTERNAL_API_KEY:}
    expose-openapi: ${EXPOSE_OPENAPI:true}
    cors-allowed-origins-csv: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3999}
    jwt:
      secret: ${JWT_SECRET:}
  kafka:
    topics:
      wallet-create: wallet-create-topic
      payment-commission: transaction-commission-topic
    consumer:
      retry:
        initial-interval-ms: ${KAFKA_LISTENER_RETRY_INITIAL_MS:1000}
        multiplier: ${KAFKA_LISTENER_RETRY_MULTIPLIER:2.0}
        max-interval-ms: ${KAFKA_LISTENER_RETRY_MAX_INTERVAL_MS:30000}
        max-elapsed-time-ms: ${KAFKA_LISTENER_RETRY_MAX_ELAPSED_MS:120000}
  payment:
    commission-rate: 0.1
  cache:
    redis:
      enabled: ${CACHE_REDIS_ENABLED:false}
    wallet-balance-ttl: ${CACHE_WALLET_BALANCE_TTL:PT30S}
  business:
    max-transaction-amount: ${MAX_TRANSACTION_AMOUNT:1000000}
  idempotency:
    retention: ${IDEMPOTENCY_RETENTION:P7D}

management:
  endpoints:
    web:
      exposure:
        include: ["health", "info", "prometheus"]
  endpoint:
    health:
      show-details: "always"
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      stock-service:
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        slidingWindowSize: 5
