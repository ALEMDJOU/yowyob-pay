server:
  port: 8090
  forward-headers-strategy: framework

# Config Swagger
app:
  swagger:
    server-url: ${PAYMENT_SERVER_URL:https://traefikdev.yowyob.com/payment}

springdoc:
  swagger-ui:
    config-url: /payment/v3/api-docs/swagger-config
    url: /payment/v3/api-docs
  api-docs:
    path: /v3/api-docs

spring:
  application:
    name: payment-service

  docker:
    compose:
      enabled: false

  # POSTGRESQL (R2DBC)
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:168.119.122.86}:${DB_PORT:5432}/${DB_NAME:payment_db}
    username: ${DB_USERNAME:master}
    password: ${DB_PASSWORD:Azerty1234*}
    #    url: r2dbc:postgresql://localhost:5432/reactivedb
    #    username: master
    #    password: Azerty1234
    pool:
      enabled: true
      initial-size: 1
      max-size: 5
      max-idle-time: 30m
      max-life-time: 10m
      acquire-retry: 3
      max-acquire-time: 30s
      validation-query: SELECT 1
  sql:
    init:
      mode: never

  # KAFKA
  kafka:
    bootstrap-servers: ${KAFKA_HOST:168.119.122.86}:${KAFKA_PORT:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# CUSTOM CONFIG 
application:
  external:
    stock-service-url: http://${EXTERNAL_HOST:168.119.122.86}:8081
  security:
    jwt:
      secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  kafka:
    topics:
      wallet-create: wallet-create-topic
      payment-commission: transaction-commission-topic

  payment:
    commission-rate: 0.1

management:
  endpoints:
    web:
      exposure:
        include: [ "health", "info", "prometheus" ]
  endpoint:
    health:
      show-details: "always"
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# RESILIENCE4J 
resilience4j:
  circuitbreaker:
    instances:
      stock-service:
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        slidingWindowSize: 5
