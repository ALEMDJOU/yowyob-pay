server:
  port: 8090

app:
  swagger:
    server-url: ${PAYMENT_SERVER_URL:https://traefikdev.yowyob.com/payment}

springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    config-url: /payment/v3/api-docs/swagger-config
    url: /payment/v3/api-docs

spring:
  application:
    name: payment-service
  docker:
    compose:
      enabled: false

  liquibase:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:payment_db}
    user: ${DB_LIQUIBASE_USERNAME}
    password: ${DB_LIQUIBASE_PASSWORD}
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: ${DB_SCHEMA:public}
    liquibase-schema: ${DB_SCHEMA:public}

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    pool:
      enabled: true
      initial-size: 1
      max-size: 5
      max-idle-time: 30m
      max-life-time: 10m
      acquire-retry: 3
      max-acquire-time: 30s
      validation-query: SELECT 1
  sql:
    init:
      mode: never

  kafka:
    bootstrap-servers: ${KAFKA_HOST}:${KAFKA_PORT:29092}

    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: >
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="${KAFKA_BACKEND_USER}" password="${KAFKA_BACKEND_PASSWORD}";
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

application:
  external:
    stock-service-url: http://${EXTERNAL_HOST:localhost}:8081
  security:
    internal-api-key: ${PAYMENT_INTERNAL_API_KEY}
    expose-openapi: false
    cors-allowed-origins-csv: ${CORS_ALLOWED_ORIGINS:}
    jwt:
      secret: ${JWT_SECRET}
  kafka:
    topics:
      wallet-create: wallet-create-topic
      payment-commission: transaction-commission-topic
  payment:
    commission-rate: 0.05
  business:
    max-transaction-amount: ${MAX_TRANSACTION_AMOUNT}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: false

resilience4j:
  circuitbreaker:
    instances:
      stock-service:
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        slidingWindowSize: 5
